[package]
name = "stryke-scrape"
version = "0.3.0"
description = "Web scraping / crawling client for stryke. cdylib loaded in-process — fetch a page, crawl a site (robots-respecting, depth/limit/subdomain bounded), sitemap discovery, plus pure CSS / table / link / structured-data (JSON-LD, OpenGraph) extraction. Wraps the spider engine."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-scrape"
edition = "2026"

[ffi]
lib-name = "stryke_scrape"
namespace = "Scrape"
exports = [
    "scrape__version",
    "scrape__fetch",
    "scrape__crawl",
    "scrape__links",
    "scrape__sitemap",
    "scrape__extract",
    "scrape__extract_table",
    "scrape__extract_links",
    "scrape__extract_attrs",
    "scrape__structured",
    "scrape__extract_text",
    "scrape__extract_meta",
    "scrape__extract_images",
    "scrape__extract_feeds",
    "scrape__absolutize",
    "scrape__select",
    "scrape__select_text",
    "scrape__headings",
    "scrape__forms",
    "scrape__microdata",
    "scrape__url_encode",
    "scrape__url_decode",
    "scrape__parse_query",
    "scrape__build_query",
    "scrape__url_parse",
    "scrape__same_origin",
    "scrape__normalize_url",
    "scrape__set_query_params",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
